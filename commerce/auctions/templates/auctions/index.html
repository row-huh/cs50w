{% extends "auctions/layout.html" %}

{% block body %}
    {% if user.is_authenticated %}
        <h2>Active Listings</h2>
        {% for object in data %}
            <a href="{% url 'listing-page' %}/{{ object.id }}"> 
            <p>{{ object.id }}<p>
            </a>
        {% endfor %}
    {% endif %}
{% endblock %}
